name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create MCP config
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        run: |
          # Sanitize the token: strip CR/LF, surrounding whitespace, stray
          # surrounding quotes, and an accidental leading "Bearer " prefix.
          # Guards against copy-paste slips when the secret was saved.
          TOKEN="$(printf '%s' "$PALLET_TRADE_TOKEN" | tr -d '\r\n')"
          TOKEN="${TOKEN#"${TOKEN%%[![:space:]]*}"}"   # ltrim
          TOKEN="${TOKEN%"${TOKEN##*[![:space:]]}"}"   # rtrim
          TOKEN="${TOKEN%\"}"; TOKEN="${TOKEN#\"}"       # strip double quotes
          TOKEN="${TOKEN%\'}"; TOKEN="${TOKEN#\'}"       # strip single quotes
          TOKEN="${TOKEN#Bearer }"                       # strip stray "Bearer "

          # Interpolate the token here in the shell (unquoted heredoc) so the
          # config file contains the real value. The app does not reliably
          # expand ${VAR} inside an --mcp-config file, so we must not defer it.
          cat > "${{ runner.temp }}/mcp-config.json" << EOF
          {
            "mcpServers": {
              "pallet-trade": {
                "type": "http",
                "url": "https://pallet.trade/mcp",
                "headers": {
                  "Authorization": "Bearer ${TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Diagnose pallet.trade auth
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        run: |
          echo "token length: ${#PALLET_TRADE_TOKEN}"
          case "$PALLET_TRADE_TOKEN" in
            pt_mcp_*) echo "prefix check: OK (starts with pt_mcp_)";;
            Bearer*)  echo "prefix check: BAD — secret value includes a 'Bearer ' prefix";;
            "")       echo "prefix check: EMPTY — secret is not set";;
            *)        echo "prefix check: UNEXPECTED prefix";;
          esac
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST https://pallet.trade/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Authorization: Bearer ${PALLET_TRADE_TOKEN}" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"diag","version":"1"}}}' \
            --max-time 15)
          echo "pallet.trade handshake HTTP status: $code (200 = token authenticates)"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Temporary: surface SDK/MCP connection logs to debug the remote server.
          show_full_output: true

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Give Claude access to the pallet.trade MCP server and permit its tools.
          claude_args: |
            --mcp-config ${{ runner.temp }}/mcp-config.json
            --allowed-tools "mcp__pallet-trade__get_deal,mcp__pallet-trade__get_deals"
            --debug


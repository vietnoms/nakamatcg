name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create MCP config
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        run: |
          # Interpolate the token here in the shell (unquoted heredoc) so the
          # config file contains the real value. The app does not reliably
          # expand ${VAR} inside an --mcp-config file, so we must not defer it.
          cat > "${{ runner.temp }}/mcp-config.json" << EOF
          {
            "mcpServers": {
              "pallet-trade": {
                "type": "http",
                "url": "https://pallet.trade/mcp",
                "headers": {
                  "Authorization": "Bearer ${PALLET_TRADE_TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Give Claude access to the pallet.trade MCP server and permit its tools.
          claude_args: |
            --mcp-config ${{ runner.temp }}/mcp-config.json
            --allowed-tools "mcp__pallet-trade__get_deal,mcp__pallet-trade__get_deals"


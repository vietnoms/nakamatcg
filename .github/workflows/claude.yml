name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create MCP config
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
        run: |
          # Sanitize the token: strip CR/LF, surrounding whitespace, stray
          # surrounding quotes, and an accidental leading "Bearer " prefix.
          # Guards against copy-paste slips when the secret was saved.
          TOKEN="$(printf '%s' "$PALLET_TRADE_TOKEN" | tr -d '\r\n')"
          TOKEN="${TOKEN#"${TOKEN%%[![:space:]]*}"}"   # ltrim
          TOKEN="${TOKEN%"${TOKEN##*[![:space:]]}"}"   # rtrim
          TOKEN="${TOKEN%\"}"; TOKEN="${TOKEN#\"}"       # strip double quotes
          TOKEN="${TOKEN%\'}"; TOKEN="${TOKEN#\'}"       # strip single quotes
          TOKEN="${TOKEN#Bearer }"                       # strip stray "Bearer "

          # Write .mcp.json at the repo root. claude-code-action loads MCP
          # servers from the project settings source (enableAllProjectMcpServers),
          # NOT from --mcp-config passed via claude_args — so the file must live
          # here. The token is baked in at build time (unquoted heredoc); the
          # file is only in the ephemeral runner workspace, never committed.
          cat > "${{ github.workspace }}/.mcp.json" << EOF
          {
            "mcpServers": {
              "pallet-trade": {
                "type": "http",
                "url": "https://pallet.trade/mcp",
                "headers": {
                  "Authorization": "Bearer ${TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          PALLET_TRADE_TOKEN: ${{ secrets.PALLET_TRADE_TOKEN }}
          # Wait for the remote MCP server to finish connecting before Claude
          # starts, otherwise its tools are not yet registered in the session.
          MCP_CONNECTION_NONBLOCKING: "0"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # The pallet.trade server is loaded from the repo-root .mcp.json
          # (via enableAllProjectMcpServers); here we only permit its tools.
          claude_args: |
            --allowed-tools "mcp__pallet-trade__get_deal,mcp__pallet-trade__get_deals"

            --debug

